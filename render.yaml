# Render blueprint: the scheduled mailbox poller (see worker/poll.ts).
# Netlify hosts the Next.js app; this cron job is what actually syncs
# vendor replies from the platform Gmail into Supabase every 5 minutes.
services:
  - type: cron
    name: kalas-poll-replies
    runtime: node
    region: frankfurt # keep near the Supabase project (EU)
    plan: starter
    schedule: "*/5 * * * *"
    buildCommand: npm ci
    startCommand: npm run poll
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
